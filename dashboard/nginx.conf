server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the dashboard SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to DependencyTrack API server.
    # Dashboard JS calls /api/* (same-origin) — nginx forwards to the container.
    # CORS headers are added here as a safety net for any direct browser access.
    location /api/ {
        proxy_pass http://dtrack-apiserver:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;

        # Handle pre-flight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Api-Key';
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '*'                                         always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS'           always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Api-Key'   always;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
