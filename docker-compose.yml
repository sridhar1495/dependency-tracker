#
# Dependency-Track Community Edition — Docker Compose
# Includes: API Server, Frontend, PostgreSQL, and Custom Dashboard
#

volumes:
  dependency-track-data:
    driver: local
  postgres-data:
    driver: local

networks:
  dependency-track:
    driver: bridge

services:

  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dtrack}
      POSTGRES_USER: ${POSTGRES_USER:-dtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dtrack_password_change_me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dependency-track
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dtrack} -d ${POSTGRES_DB:-dtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── DependencyTrack API Server ─────────────────────────────────────────────
  dtrack-apiserver:
    image: dependencytrack/apiserver:${DT_VERSION:-latest}
    container_name: dt-apiserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── Database ──────────────────────────────────────────────────────────
      ALPINE_DATABASE_MODE: "external"
      ALPINE_DATABASE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dtrack}"
      ALPINE_DATABASE_DRIVER: "org.postgresql.Driver"
      ALPINE_DATABASE_USERNAME: "${POSTGRES_USER:-dtrack}"
      ALPINE_DATABASE_PASSWORD: "${POSTGRES_PASSWORD:-dtrack_password_change_me}"
      # ── API Key for initial admin bootstrap ───────────────────────────────
      ALPINE_FORCE_CHANGE_PASSWORD: "false"
      # ── HTTP ──────────────────────────────────────────────────────────────
      ALPINE_HTTP_PORT: "8080"
      # ── Data directory ────────────────────────────────────────────────────
      ALPINE_DATA_DIRECTORY: "/data"
      # ── OIDC (optional, uncomment to enable) ──────────────────────────────
      # ALPINE_OIDC_ENABLED: "true"
      # ALPINE_OIDC_ISSUER: "https://your-idp/.well-known/openid-configuration"
    volumes:
      - dependency-track-data:/data
    ports:
      - "${DT_API_PORT:-8081}:8080"
    networks:
      - dependency-track
    deploy:
      resources:
        limits:
          memory: 12g
        reservations:
          memory: 4g
    healthcheck:
      # First-run downloads the NVD database — allow up to 15 minutes.
      # start_period: container is not marked unhealthy during this window.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 600s

  # ─── DependencyTrack Frontend ────────────────────────────────────────────────
  dtrack-frontend:
    image: dependencytrack/frontend:${DT_VERSION:-latest}
    container_name: dt-frontend
    restart: unless-stopped
    depends_on:
      dtrack-apiserver:
        # service_started (not service_healthy) so the frontend launches
        # immediately — it will keep retrying API connections on its own.
        condition: service_started
    environment:
      API_BASE_URL: "http://${DT_HOST:-localhost}:${DT_API_PORT:-8081}"
    ports:
      - "${DT_FRONTEND_PORT:-8080}:8080"
    networks:
      - dependency-track

  # ─── Custom Risk Dashboard ────────────────────────────────────────────────────
  dt-dashboard:
    image: nginx:alpine
    container_name: dt-dashboard
    restart: unless-stopped
    environment:
      # Where nginx should proxy /api/* requests.
      # Local (default): the API server on the same Docker network.
      # Production:      set to your external DT URL, e.g.
      #                    DT_API_INTERNAL_URL=https://dtrack.company.com
      DT_API_INTERNAL_URL: "${DT_API_INTERNAL_URL:-http://dtrack-apiserver:8080}"
      # Optional: pre-configure the DT API key so the dashboard loads live data
      # automatically on page open (no manual "Connect API" step needed).
      # Leave blank to keep the default manual-connect behaviour.
      DT_API_KEY: "${DT_API_KEY:-}"
      # Optional: DependencyTrack UI URL used by the dashboard for clickable project links.
      DT_FRONTEND_URL: "${DT_FRONTEND_URL:-}"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      # nginx:alpine's entrypoint runs envsubst on *.template files in this dir
      # and writes the result to /etc/nginx/conf.d/ at container startup.
      - ./dashboard/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${DT_DASHBOARD_PORT:-3000}:80"
    networks:
      - dependency-track
    depends_on:
      - dtrack-apiserver
