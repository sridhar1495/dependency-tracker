#
# Dependency-Track Risk Dashboard — Docker Compose
# Serves the custom risk dashboard and violation cache service.
# Both containers proxy to an existing DependencyTrack API instance
# (set DT_API_INTERNAL_URL to point at your DT API server).
#

networks:
  dependency-track:
    driver: bridge

services:

  # ─── Custom Risk Dashboard ────────────────────────────────────────────────────
  dt-dashboard:
    image: nginx:alpine
    container_name: dt-dashboard
    restart: unless-stopped
    environment:
      # Where nginx should proxy /api/* requests.
      # Point this at your DependencyTrack API server (on the same Docker network
      # or an external URL if DT is hosted elsewhere).
      # Example external: DT_API_INTERNAL_URL=https://dtrack.company.com
      DT_API_INTERNAL_URL: "${DT_API_INTERNAL_URL:-http://dtrack-apiserver:8080}"
      # Optional: pre-configure the DT API key so the dashboard loads live data
      # automatically on page open (no manual "Connect API" step needed).
      DT_API_KEY: "${DT_API_KEY:-}"
      # Optional: DependencyTrack UI URL used by the dashboard for clickable project links.
      DT_FRONTEND_URL: "${DT_FRONTEND_URL:-}"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      # nginx:alpine's entrypoint runs envsubst on *.template files in this dir
      # and writes the result to /etc/nginx/conf.d/ at container startup.
      - ./dashboard/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "${DT_DASHBOARD_PORT:-3000}:80"
    networks:
      - dependency-track

  # ─── Violation Cache Service ──────────────────────────────────────────────────
  # Fetches all policy violations from DependencyTrack on demand and caches the
  # per-project count map in a JSON file.  The dashboard reads this file instead
  # of streaming large violation payloads through the browser on every page load.
  #
  # Endpoints (proxied through nginx at /violation-cache/*):
  #   GET  /violation-cache/status   — cache state + build progress
  #   GET  /violation-cache/data     — the cached per-project violation map
  #   POST /violation-cache/refresh  — trigger a background rebuild
  dt-violation-cache:
    build:
      context: ./violation-cache
    container_name: dt-violation-cache
    restart: unless-stopped
    environment:
      # Must point to the DT API server reachable from within this container.
      DT_API_URL: "${DT_API_INTERNAL_URL:-http://dtrack-apiserver:8080}"
      # DT API key used by the cache service to fetch violations server-side.
      DT_API_KEY: "${DT_API_KEY:-}"
      # How many hours the cached file is valid before auto-expiry (default 24 h).
      CACHE_TTL_HOURS: "${VIOLATION_CACHE_TTL_HOURS:-24}"
      PORT: "3001"
    volumes:
      # Persists violation-cache.json across container restarts.
      - ./violation-cache/data:/data
    networks:
      - dependency-track
